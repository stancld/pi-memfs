---
# Local development infrastructure for pi-memfs.
#
#   docker compose up -d
#
# Ports bind to 127.0.0.1 only. Override with POSTGRES_PORT etc.

services:
  postgres:
    # VFS metadata store. schema.sql is applied on first init.
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pi_memfs
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - 127.0.0.1:${POSTGRES_PORT-5432}:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pi_memfs"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    # VFS blob store (S3-compatible). Console at http://localhost:9001.
    image: minio/minio:RELEASE.2025-05-24T17-08-30Z
    environment:
      MINIO_ROOT_USER: minio_key
      MINIO_ROOT_PASSWORD: minio_secret_key
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - miniodata:/data
    ports:
      - 127.0.0.1:${MINIO_PORT-9000}:9000
      - 127.0.0.1:${MINIO_CONSOLE_PORT-9001}:9001

  createbuckets:
    # One-shot: waits for MinIO, then creates the VFS bucket. Exits 0.
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      S3_BUCKET: ${S3_BUCKET-pi-memfs-dev}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minio_key minio_secret_key; do
        echo 'Waiting for MinIO...'; sleep 1;
      done;
      mc mb --ignore-existing local/$${S3_BUCKET};
      echo 'Bucket ready: '$${S3_BUCKET};
      "

volumes:
  pgdata:
  miniodata:
