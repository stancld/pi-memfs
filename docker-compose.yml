---
# Local development infrastructure for pi-memfs.
#
#   docker compose up -d
#
# Ports bind to 127.0.0.1 only. Override with POSTGRES_PORT etc.

services:
  postgres:
    # VFS metadata store. schema.sql is applied on first init.
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pi_memfs
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - 127.0.0.1:${POSTGRES_PORT-5432}:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pi_memfs"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
